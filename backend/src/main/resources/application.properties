spring.application.name=pura-data
# URL JDBC completa con credenciales, ej:
# jdbc:postgresql://host/db?user=X&password=Y&sslmode=require
spring.datasource.url=${JDBC_DATABASE_URL:jdbc:postgresql://localhost:5432/puradata?user=postgres&password=postgres}

# IA local via Ollama (http://localhost:11434 por defecto)
spring.ai.ollama.chat.options.model=llama3.2
spring.ai.ollama.embedding.options.model=nomic-embed-text
